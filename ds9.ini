global ds9
global buttons
global pbuttons
global samp

proc AsdfFileAccess {} {
    set exeDir [file dirname [info nameofexecutable]]
    set pythonFile ${exeDir}/fromds9.py
    set pids [exec python $pythonFile &]
}
package provide DS9 1.0

ButtonButton $ds9(buttons).file.asdf asdf AsdfFileAccess
set pbuttons(file,asdf) 1
append buttons(file) "$ds9(buttons).file.asdf pbuttons(file,asdf)"

LayoutButtons

