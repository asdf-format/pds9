global ds9
global buttons
global pbuttons
global samp

proc AsdfFileAccess {pds9_python} {
    set exeDir [file dirname [info nameofexecutable]]
    set pids [exec $pds9_python -m pds9 &]
}
package provide DS9 1.0

ButtonButton $ds9(buttons).file.asdf asdf [list AsdfFileAccess $pds9_python]
set pbuttons(file,asdf) 1
append buttons(file) "$ds9(buttons).file.asdf pbuttons(file,asdf)"

LayoutButtons

